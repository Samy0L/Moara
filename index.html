<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moara</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<body>

  <h1>Moara</h1>

  <div class="mode-box">
    <label for="mod-joc">Mod de joc:</label>
    <select id="mod-joc">
      <option value="human-human">Human vs Human</option>
      <option value="computer-easy">Human vs Computer - Easy</option>
      <option value="computer-moderate">Human vs Computer - Moderate</option>
    </select>
    <p>Mod curent: <span id="mod-curent">Human vs Human</span></p>
  </div>

  <div class="game-container">
    <div class="player-box player-one" id="player-box-1">
      <h2>Jucatorul 1</h2>
      <div id="formular-jucator-1" class="name-form">
        <input id="input-jucator-1" type="text" placeholder="Introdu numele" />
        <button id="buton-jucator-1">Confirma</button>
      </div>
      <p id="nume-jucator-1">Nume necompletat</p>
      <p>Piese pe tabla: <span id="piese-tabla-1">0</span></p>
      <p>Piese ramase de pus: <span id="piese-ramase-1">9</span></p>
      <p>Piese luate: <span id="piese-luate-1">0</span></p>
    </div>

    <div id="canvas-container"></div>

    <div class="player-box player-two" id="player-box-2">
      <h2>Jucatorul 2</h2>
      <div id="formular-jucator-2" class="name-form">
        <input
          id="input-jucator-2"
          type="text"
          placeholder="Introdu numele"
          disabled
        />
        <button id="buton-jucator-2" disabled>Confirma</button>
      </div>
      <p id="nume-jucator-2">Nume necompletat</p>
      <p>Piese pe tabla: <span id="piese-tabla-2">0</span></p>
      <p>Piese ramase de pus: <span id="piese-ramase-2">9</span></p>
      <p>Piese luate: <span id="piese-luate-2">0</span></p>
    </div>
  </div>

  <div id="win-overlay" class="hidden">
    <div id="win-box">
      <h2 id="win-title">Victorie!</h2>
      <p id="win-desc"></p>
      <button id="win-restart-btn">Joc nou</button>
    </div>
  </div>

  <script type="module" src="./board.js"></script>

</body>
</html>
